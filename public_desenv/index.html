<body>


    <div class="box">
        <h2 class="title">Encurtador de Links</h2>

        <div class="box_input">
          <input class="input_url" id="link_inputURL" type="text" placeholder="Coloque aqui o link">
          <p  class="urlCurta_gerada" id='link_URLmenor_gerada'></p>
        </div>
        
        <div class="box_button">
          <button class="btn" id="btn_linkMenor">Encurtar</button>
          <button class="btn btn_copiar" id="btn_copiarURL">Copiar</button>
        </div>

        <div class="info_dadoSalvos" id="link_mostrarQTD_dadoSalvos"></div>
        
    </div>


<!-- Firebase usado no encurtador de links -->
<script type="module" src="js/link/link.js"></script>
<script>
let copiar_URLmenor = document.getElementById("link_URLmenor_gerada");
let copiar_URLbtn = document.getElementById("btn_copiarURL");
let copiar_textoSucesso = "<i>Link copiado para a área de transferência</i>";
copiar_URLbtn.style = "cursor: pointer;";


async function copiarTexto(event){ // https://flaviocopes.com/clipboard-api/
  if (!navigator.clipboard) {      // Clipboard API not available
    return
  }
  const text = event.target.innerText
  try {

    if (event.target.tagName == "P"){
      await navigator.clipboard.writeText(text)

    } else if (event.target.tagName == "BUTTON"){
        await navigator.clipboard.writeText(copiar_URLmenor.innerText)

    } else { console.log("event.target.tagName: ", event.target.tagName) }
    
    // LINHA ABAIXO: coloca na tela a string gerada para o link curto
    copiar_URLmenor.innerHTML = copiar_textoSucesso;
  } catch (err) {
    console.error('Falha ao copiar: ', err)
  }

}
copiar_URLmenor.addEventListener('click', async event => { copiarTexto(event); })
copiar_URLbtn.addEventListener('click', async event => { copiarTexto(event); })
</script>
